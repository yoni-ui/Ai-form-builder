# CI: backend tests + frontend build on every push/PR to main.
# CD: after a successful run on main, POSTs Render deploy hook if RENDER_DEPLOY_HOOK_URL is set
# (Dashboard → your Web Service → Manual Deploy → Deploy Hook).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          SUPABASE_JWT_SECRET: ""
        run: pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy-render:
    name: CD — Render deploy hook
    needs: [backend, frontend]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      secrets.RENDER_DEPLOY_HOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$HOOK"
