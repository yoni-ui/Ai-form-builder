# Render Blueprint — FastAPI API (free web service).
# Required env (set in Dashboard or complete Blueprint prompts):
#   CORS_ORIGINS, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_JWT_SECRET,
#   and at least one of GROQ_API_KEY / GEMINI_API_KEY.
# Optional: DAILY_LLM_CREDIT_LIMIT (default 20 in this file).
# Service URL → use as VITE_API_URL on Vercel (no trailing slash).

services:
  - type: web
    name: useformly-api
    runtime: python
    plan: free
    region: oregon
    # Works with repo root or Root Directory = backend (see conditionals).
    buildCommand: if [ -d backend ]; then pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r backend/requirements.txt; else pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt; fi
    startCommand: if [ -f app/main.py ]; then python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT; else cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT; fi
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Comma-separated origins (no spaces). Example: https://your-app.vercel.app,http://localhost:5173
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DAILY_LLM_CREDIT_LIMIT
        value: "20"
