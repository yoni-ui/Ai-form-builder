# Render Blueprint: free web service for the FastAPI API.
# Dashboard: New → Blueprint → connect this repo → Render reads render.yaml.
# After the first deploy, set secrets in the service → Environment (or complete sync prompts).

services:
  - type: web
    name: useformly-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Comma-separated origins (no spaces). Example: https://your-app.vercel.app,http://localhost:5173
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DAILY_LLM_CREDIT_LIMIT
        value: "20"
